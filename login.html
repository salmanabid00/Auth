<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <form id="loginForm" novalidate>
    <h2>Login</h2>

    <input type="text" id="identifier" placeholder="Email or Username" required>
    <span class="error-msg" id="identifierError">Please enter your email or username.</span>
    <input type="password" id="password" placeholder="Password" required>
    <span class="error-msg" id="passwordError">Please enter your password.</span>

    <button type="submit">Login</button>
    <a href="Register.html">Don't have an account? Register</a>
  </form>

  <script src="login.js"></script>
</body>
</html>
